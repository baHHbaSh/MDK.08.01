<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>svg</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg width="300" height="290">
		<rect fill="#0AE" height="200" width="100%"/>
		<rect fill="#0E4" height="90" y="200" width="100%"/>

		<rect x="100" width="10" height="60" rx="10" y="200"/>
		<rect x="200" width="10" height="60" rx="10" y="200"/>

		<circle cx="150" cy="145" r="100" fill="#A00"/>
		<circle cx="150" cy="145" r="80" fill="#FFF"/>
		<circle cx="150" cy="145" r="60" fill="#A00"/>
		<circle cx="150" cy="145" r="40" fill="#FFF"/>
		<circle cx="150" cy="145" r="20" fill="#A00"/>
	</svg>
	</body>
</html>
