<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div>
            <img src="img.jpg" alt="Карточка товара">
        </div>
        <div class="information">
            <h1>Самый классный товар</h1>
            <div class="action">
                <div>Рассрочка 0-0-24</div>
                <div>Скидка 20% на лоток</div>
            </div>
            <div class="description">
                <div>
                    <div>Ширина</div>
                    <div class="value">20см</div>
                </div>
                <div>
                    <div>Высота</div>
                    <div class="value">40см</div>
                </div>
                <div>
                    <div>Год релиза</div>
                    <div class="value">2021</div>
                </div>
            </div>
            <div class="price">
                <div>Цена сегодня</div>
                <div>129 990 р.</div>
            </div>
            <div class="add">Добавить в корзину</div>
        </div>
    </div>
</body>
</html>
