<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Контакты | Vertex Architects</title>
</head>
<body>
<div class="site-wrapper">
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">Vertex</a>
            <input type="checkbox" id="menu-checkbox">
            <label for="menu-checkbox" class="menu-toggle"><i class="fas fa-bars"></i></label>
            <nav>
                <ul class="nav-menu">
                    <li><a href="../index.html">Главная</a></li>
                    <li><a href="about.html">О бюро</a></li>
                    <li><a href="projects.html">Проекты</a></li>
                    <li><a href="services.html">Услуги</a></li>
                    <li><a href="portfolio.html">Портфолио</a></li>
                    <li><a href="blog.html">Блог</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="frame reveal delay-1">
            <h2>Свяжитесь с нами</h2>
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="name">Ваше имя</label>
                    <input type="text" id="name" name="name" required class="form-input" placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required class="form-input" placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label for="message">Сообщение</label>
                    <textarea id="message" name="message" rows="5" required class="form-input" placeholder="Ваше сообщение..."></textarea>
                </div>
                <button class="btn" id="s">Отправить</button>
            </form>
        </section>

        <section class="frame reveal delay-2">
            <h2>Реквизиты</h2>
            <p><strong>Адрес:</strong> ул. Мира, 10, Пермь</p>
            <p><strong>Телефон:</strong> +7 (880) 233-06-05</p>
            <a href="mailto:info@vertex-architects.com"><strong>Email:</strong> info@vertex-architects.com</a>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 Vertex Architects</p>
    </footer>
    <script>
        let b = document.getElementById("s");
        b.addEventListener("click", ()=>{alert("500 Internal server error")})
    </script>
</div>
</body>
</html>
